{% extends "base.html" %}
{% block title %}Scan - {{ app_name }}{% endblock %}
{% block content %}
<div class="scan-page">
    <div class="card scan-card">
        <div class="card-body">
            <h1 class="page-title mb-3">QR scan</h1>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label class="form-label fw-semibold">Κωδικός QR</label>
                <input class="form-control scan-input" name="token" autocomplete="off" autofocus>
                <button class="btn btn-primary w-100 mt-3" type="submit">Έλεγχος</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
