{% extends "base.html" %}
{% block title %}Αλλαγή κωδικού - {{ app_name }}{% endblock %}
{% block content %}
<div class="narrow-page">
    <div class="card">
        <div class="card-header">Αλλαγή κωδικού</div>
        <div class="card-body">
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Τρέχων κωδικός</label>
                    <input class="form-control" type="password" name="current_password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Νέος κωδικός</label>
                    <input class="form-control" type="password" name="new_password" minlength="8" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Επιβεβαίωση</label>
                    <input class="form-control" type="password" name="confirm_password" minlength="8" required>
                </div>
                <button class="btn btn-primary" type="submit">Αποθήκευση</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
